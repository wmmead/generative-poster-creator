<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text pattern generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Fira+Code:wght@300..700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <link href="styles.css" rel="stylesheet">

    <script type="module" src="js/main.js"></script>
</head>
<body>
    <main>

    </main>
    <div class="controls">
        <div class="controls-actions">
            <button type="button" id="addLayerBtn">Add Layer</button>
            <button type="button" id="printBtn">Print / Export PDF</button>
        </div>
        <details>
            <summary>Document Settings</summary>
            <form id="sizeForm">
                <h2>Set Document Size</h2>

                <label for="widthInches">Width (in inches):</label>
                <input type="number" step="0.01" id="widthInches" required>

                <label for="heightInches">Height (in inches):</label>
                <input type="number" step="0.01" id="heightInches" required>

                <button type="submit">Apply Size</button>
                <p id="displaySize">11" x 17" (default)</p>
            </form>

            <form>
                <label for="zoomRange">Zoom Level</label>
                <div class="slider-container">
                    <input
                        type="range"
                        id="zoomRange"
                        min="0"
                        max="5"
                        step="1"
                        value="3"
                        autocomplete="off"
                    >
                    <span class="zoom-level" id="zoomLevelDisplay">100%</span>
                </div>
            </form>
        </details>
        <div id="layersList"></div>
    </div>

    <template id="layerTemplate">
        <details class="layer-panel" open>
            <summary>
                <span class="layer-name">Layer</span>
                <span class="layer-buttons">
                    <button type="button" class="move-up" title="Move up the list (paints earlier, further behind)">&#9650;</button>
                    <button type="button" class="move-down" title="Move down the list (paints later, more in front)">&#9660;</button>
                    <button type="button" class="remove-layer" title="Remove layer">&#10005;</button>
                </span>
            </summary>
            <form>
                <label>Font Family</label>
                <select name="fontFamily">
                    <option>Oswald</option>
                    <option>Fira Code</option>
                    <option>Playfair Display</option>
                    <option>IBM Plex Sans</option>
                    <option>EB Garamond</option>
                    <option>Caveat</option>
                </select>

                <label>Min Font Size (px)</label>
                <div class="slider-container">
                    <input type="range" name="minFontSize" min="1" max="1000" value="1">
                    <span class="slider-value">1</span>
                </div>
                <label>Max Font Size (px)</label>
                <div class="slider-container">
                    <input type="range" name="maxFontSize" min="1" max="1000" value="1000">
                    <span class="slider-value">1000</span>
                </div>

                <label>Min Font Weight</label>
                <div class="slider-container">
                    <input type="range" name="minFontWeight" min="100" max="800" step="1" value="300">
                    <span class="slider-value">300</span>
                </div>
                <label>Max Font Weight</label>
                <div class="slider-container">
                    <input type="range" name="maxFontWeight" min="100" max="800" step="1" value="700">
                    <span class="slider-value">700</span>
                </div>
                <div class="font-style"></div>

                <label>Min Opacity</label>
                <div class="slider-container">
                    <input type="range" name="minOpacity" min="0" max="100" value="0">
                    <span class="slider-value">0</span>
                </div>
                <label>Max Opacity</label>
                <div class="slider-container">
                    <input type="range" name="maxOpacity" min="0" max="100" value="100">
                    <span class="slider-value">100</span>
                </div>

                <label>Min Rotation (degrees)</label>
                <div class="slider-container">
                    <input type="range" name="minRotationDeg" min="-180" max="180" value="-180">
                    <span class="slider-value">-180</span>
                </div>
                <label>Max Rotation (degrees)</label>
                <div class="slider-container">
                    <input type="range" name="maxRotationDeg" min="-180" max="180" value="180">
                    <span class="slider-value">180</span>
                </div>

                <label>Color</label>
                <input type="color" name="rgbColor" value="#000000">

                <label>Lightness Min (%)</label>
                <div class="slider-container">
                    <input type="range" name="lightnessMinPercent" min="0" max="100" value="0">
                    <span class="slider-value">0</span>
                </div>
                <label>Lightness Max (%)</label>
                <div class="slider-container">
                    <input type="range" name="lightnessMaxPercent" min="0" max="100" value="100">
                    <span class="slider-value">100</span>
                </div>

                <label>Width Percent</label>
                <div class="slider-container">
                    <input type="range" name="widthPercent" min="1" max="100" value="100">
                    <span class="slider-value">100</span>
                </div>
                <label>Height Percent</label>
                <div class="slider-container">
                    <input type="range" name="heightPercent" min="1" max="100" value="100">
                    <span class="slider-value">100</span>
                </div>

                <label>Text Characters</label>
                <textarea name="textCharacters">} { ( ) ;</textarea>

                <div class="layer-actions">
                    <button type="button" class="startBtn">Start</button>
                    <button type="button" class="stopBtn">Stop</button>
                    <button type="button" class="clearBtn">Clear</button>
                </div>
            </form>
        </details>
    </template>
</body>
</html>
